name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    name: Bridge typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test  # unit tests (git config needed for the temp-repo fixtures)
        env:
          GIT_AUTHOR_NAME: ci
          GIT_AUTHOR_EMAIL: ci@example.com
          GIT_COMMITTER_NAME: ci
          GIT_COMMITTER_EMAIL: ci@example.com

  android:
    name: Android unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      # JVM unit tests only (no emulator) — compiles the app's debug + test sources and runs
      # DiffClassifierTest et al. Also catches Kotlin compile regressions on every PR.
      - name: Unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace
