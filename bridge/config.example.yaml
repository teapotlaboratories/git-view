# GitView bridge configuration. Copy to config.yaml and edit.
# Paths may start with ~ (home) and are resolved relative to THIS file if not absolute.

bind: 127.0.0.1        # bind loopback only; expose via Tailscale Serve (see docs/SECURITY.md)
port: 8787

auth:
  tokensFile: ./.gitview/tokens.json   # issued bearer tokens (mode 0600)

limits:
  bodyLimitBytes: 10485760     # 10 MiB request cap (explicit — do not rely on framework default)
  writeSizeCapBytes: 8388608   # 8 MiB per-file write cap

audit:
  file: ./.gitview/audit.log   # append-only log of every write + tool call

claude:
  defaultProvider: local-sdk   # local-sdk | remote-control
  defaultProfile: auto         # read-only | confined-agent | acceptEdits | auto | dontAsk | bypassPermissions
  maxBudgetUsd: 5              # SOFT cap; exhaustion surfaces as result subtype error_max_budget_usd
  sandbox:
    enabled: true
    failIfUnavailable: true    # refuse to run the local agent unconfined
    denyRead:                  # hide secrets from the agent
      - ~/.ssh
      - ~/.aws
    allowedDomains:            # default-deny egress allowlist
      - api.anthropic.com

repos:
  - id: gitview
    path: ~/dev/gitview
    # provider: local-sdk      # optional per-repo override of claude.defaultProvider
    # profile: confined-agent  # optional per-repo override of claude.defaultProfile
