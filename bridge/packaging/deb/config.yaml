# GitView bridge configuration. See docs/CONFIG or the project README.
# Loopback only — publish to your tailnet with Tailscale Serve; never bind a public interface.
bind: 127.0.0.1
port: 8787
auth:
  tokensFile: /var/lib/gitview-bridge/tokens.json
audit:
  file: /var/lib/gitview-bridge/audit.log
limits:
  bodyLimitBytes: 12582912
  writeSizeCapBytes: 8388608
claude:
  defaultProvider: local-sdk
  defaultProfile: auto
  maxBudgetUsd: 5
  sandbox:
    enabled: false
    failIfUnavailable: false
# Add the repositories to serve. The gitview-bridge user must be able to
# read/write these paths and run git in them.
repos: []
#  - id: myrepo
#    name: My Repo
#    path: /srv/repos/myrepo
