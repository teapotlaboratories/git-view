# GitView bridge configuration. See docs/CONFIG or the project README.
# Binds all interfaces (0.0.0.0) so devices on your network/tailnet can reach it directly. This is a
# read/write bridge (every request is pairing-token gated) — keep it behind a firewall or VPN
# (e.g. Tailscale) and never expose it on a hostile/public network. Set bind: 127.0.0.1 to restrict
# it to this host and front it with `tailscale serve`.
bind: 0.0.0.0
port: 8787
auth:
  tokensFile: /var/lib/gitview-bridge/tokens.json
audit:
  file: /var/lib/gitview-bridge/audit.log
limits:
  bodyLimitBytes: 12582912
  writeSizeCapBytes: 8388608
claude:
  defaultProvider: local-sdk
  defaultProfile: auto
  maxBudgetUsd: 5
  sandbox:
    enabled: false
    failIfUnavailable: false
# Add repositories to serve directly here. By default the service runs as the user who installed the
# .deb (see the run-as-user drop-in), so your own repos are readable; the service User must be able to
# read/write + run git in whatever paths you list.
repos: []
# workspaceRoots (dirs the app may browse + open as workspaces) is set for you at install time — an
# existing ~/Developments, else a created ~/repos. Edit it below or here after install.
#  - id: myrepo
#    name: My Repo
#    path: /srv/repos/myrepo
